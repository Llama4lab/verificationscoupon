
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title data-lang-key="title">Confirmation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
  <link rel="shortcut icon" href="favicon_io/favicon.ico" type="image/x-icon">
  
  <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon_io/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="favicon_io/android-chrome-512x512.png">
  
  <link rel="manifest" href="favicon_io/site.webmanifest">

  <style>
    body {
      background-color: #f0f2f5;
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .confirmation-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .confirmation-box {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
      width: 100%;
      max-width: 600px;
      text-align: center;
    }

    .success-banner {
      background-color: #d1e7dd;
      color: #0f5132;
      padding: 15px 20px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .success-icon {
      background-color: #198754;
      color: white;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin-right: 15px;
    }

    .success-text {
      font-size: 1.25rem;
      font-weight: 500;
    }

    .confirmation-message {
      font-size: 1.1rem;
      margin-bottom: 30px;
    }

    .btn-success {
      font-size: 1rem;
      padding: 10px 25px;
    }

    @media (max-width: 576px) {
      .success-banner {
        flex-direction: column;
        text-align: center;
      }

      .success-icon {
        margin-bottom: 10px;
        margin-right: 0;
      }

      .success-text {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>

  <div class="confirmation-container">
    <div class="confirmation-box">
      <div class="success-banner">
        <div class="success-icon">✅</div>
        <div class="success-text" data-lang-key="header">Merci pour votre demande !</div>
      </div>
      <p class="confirmation-message" data-lang-key="message">
        Votre recharge a été enregistrée avec succès.<br>
        Vous recevrez un email de confirmation sous peu.
      </p>
      <a class='btn btn-success' data-lang-key='back_button' href='/'>Retour à l'accueil</a>
    </div>
  </div>

  <script>
    const translations = {
        fr: {
            title: "Confirmation",
            header: "Merci pour votre demande !",
            message: "Votre recharge a été enregistrée avec succès.<br>Vous recevrez un email de confirmation sous peu.",
            back_button: "Retour à l'accueil"
        },
        en: {
            title: "Confirmation",
            header: "Thank you for your request!",
            message: "Your top-up has been successfully registered.<br>You will receive a confirmation email shortly.",
            back_button: "Back to Home"
        },
        es: {
            title: "Confirmación",
            header: "¡Gracias por su solicitud!",
            message: "Su recarga ha sido registrada con éxito.<br>Recibirá un correo electrónico de confirmación en breve.",
            back_button: "Volver al Inicio"
        },
        it: {
            title: "Conferma",
            header: "Grazie per la tua richiesta!",
            message: "La tua ricarica è stata registrata con successo.<br>Riceverai a breve un'e-mail di conferma.",
            back_button: "Torna alla Home"
        },
        de: {
            title: "Bestätigung",
            header: "Vielen Dank für Ihre Anfrage!",
            message: "Ihre Aufladung wurde erfolgreich registriert.<br>Sie erhalten in Kürze eine Bestätigungs-E-Mail.",
            back_button: "Zurück zur Startseite"
        }
    };

    const setLanguage = (lang) => {
        const langPack = translations[lang] || translations.fr; // 'fr' par défaut
        
        document.documentElement.lang = lang;
        
        // Mise à jour des éléments textuels
        document.querySelectorAll('[data-lang-key]').forEach(elem => {
            const key = elem.getAttribute('data-lang-key');
            if (langPack[key]) {
                // Utilise innerHTML pour interpréter les balises comme <br>
                elem.innerHTML = langPack[key];
            }
        });
    };

    document.addEventListener('DOMContentLoaded', () => {
        // Récupère le paramètre 'lang' de l'URL
        const params = new URLSearchParams(window.location.search);
        const lang = params.get('lang');
        
        // Applique la traduction
        // Si 'lang' n'est pas trouvé ou n'est pas dans nos traductions, le 'fr' par défaut sera utilisé
        setLanguage(lang); 
    });
  </script>

</body>
</html>
